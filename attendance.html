<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:
    linear-gradient(rgba(255,255,255,0.75),rgba(240,255,240,0.75)),
    url("cphoto.png");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

header{
    background:#ffb6c1;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    width:85%;
    margin:40px auto;
    background:rgba(255,255,255,0.9);
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

h2{
    color:#ff4f9d;
    margin-bottom:20px;
    text-align:center;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#98d998;
    color:white;
    padding:12px;
}

td{
    padding:12px;
    text-align:center;
    border:1px solid #ddd;
}

tr:nth-child(even){
    background:#f9fff9;
}

tr:hover{
    background:#ffeef5;
}

.back{
    display:inline-block;
    margin-top:25px;
    padding:12px 20px;
    background:#ffb6c1;
    color:white;
    text-decoration:none;
    border-radius:8px;
}

.back:hover{
    background:#98d998;
}

</style>

</head>
<body>

<header>
