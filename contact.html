<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:
    linear-gradient(rgba(255,255,255,0.75), rgba(240,255,240,0.75)),
    url("cphoto.png");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

header{
    background:#ffb6c1;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    width:60%;
    margin:40px auto;
    background:rgba(255,255,255,0.92);
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

h2{
    color:#ff69b4;
    text-align:center;
    margin-bottom:25px;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:5px;
    color:#4CAF50;
    font-weight:bold;
}

input, textarea{
    width:100%;
    padding:12px;
    border:2px solid #b8e6b8;
    border-radius:8px;
    outline:none;
    font-size:15px;
}

input:focus,
textarea:focus{
    border-color:#ff69b4;
}

textarea{
    resize:none;
    height:120px;
}

button{
    margin-top:20px;
    width:100%;
    padding:12px;
    background:#ffb6c1;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#98d998;
}

.info{
    margin-top:25px;
    text-align:center;
    color:#555;
    line-height:1.8;
}

.back{
    display:inline-block;
    margin-top:25px;
    padding:10px 20px;
    background:#98d998;
    color:white;
    text-decoration:none;
    border-radius:8px;
}

.back:hover{
    background:#ffb6c1;
}

</style>

</head>

<body>

<header>
    <h1>Contact Us</h1>
</header>

<div class="container">

    <h2>Send Your Query</h2>

    <form>

        <label>Full Name</label>
        <input type="text" placeholder="Enter your name" required>

        <label>Email</label>
        <input type="email" placeholder="Enter your email" required>

        <label>Message</label>
        <textarea placeholder="Write your message here..." required></textarea>

        <button type="submit">Send Message</button>

    </form>

    <div class="info">
        <p><strong>📍 Address:</strong> greenk university, london, uk</p>
        <p><strong>📞 Phone:</strong> +91 8128648138</p>
        <p><strong>📧 Email:</strong> greenk@studentportal.com</p>
    </div>

    <center>
        <a href="dashboard.html" class="back">← Back to Dashboard</a>
    </center>

</div>

</body>
</html>
